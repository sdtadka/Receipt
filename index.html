<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSS College | Official Receipt Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --bg-body: #ffffff;
            --alert-bg: #fff1f2;
            --alert-text: #e11d48;
            --kattayi: #800000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-main);
            background-color: var(--bg-body);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            padding-bottom: 80px; 
        }

        .page-container {
            width: 100%;
            max-width: 500px;
            padding: 0 20px;
            text-align: center;
        }

        @media (min-width: 1024px) {
            .page-container { max-width: 800px; }
            h1 { font-size: 2.8rem !important; }
            input, .btn-download { padding: 24px !important; font-size: 22px !important; border-radius: 20px !important; }
            .header-img { max-width: 400px !important; }
        }

        .header-img { width: 100%; max-width: 260px; margin: 0 auto 25px; display: block; }
        .full-divider { height: 4px; width: 100%; background: linear-gradient(to right, transparent, var(--kattayi), transparent); margin-bottom: 35px; border-radius: 2px; }
        h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 15px; color: #0f172a; }

        .alert-container { background: var(--alert-bg); border-radius: 14px; margin-bottom: 40px; padding: 15px 0; overflow: hidden; display: flex; }
        .marquee-content { display: flex; width: max-content; animation: infiniteScroll 20s linear infinite; }
        .alert-text { font-size: 13px; font-weight: 700; color: var(--alert-text); padding: 0 60px; white-space: nowrap; }
        @keyframes infiniteScroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .service-selection { display: flex; gap: 15px; margin-bottom: 25px; }
        .service-btn { flex: 1; padding: 15px; background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 15px; cursor: pointer; font-size: 14px; font-weight: 700; color: var(--text-sub); transition: 0.3s; }
        .service-btn.active { border-color: var(--primary); background: #eff6ff; color: var(--primary); }

        .input-group { margin-bottom: 30px; text-align: left; width: 100%; }
        label { font-size: 13px; font-weight: 800; color: var(--text-sub); text-transform: uppercase; display: block; margin-bottom: 12px; }
        input { width: 100%; padding: 20px; background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 18px; color: var(--text-main); font-size: 18px; font-weight: 600; outline: none; text-align: center; }
        input:focus { border-color: var(--primary); background: #fff; }

        .btn-download { width: 100%; padding: 20px; background: var(--primary); border: none; border-radius: 18px; color: #ffffff; font-weight: 700; font-size: 18px; cursor: pointer; box-shadow: 0 15px 30px -5px rgba(37, 99, 235, 0.4); }

        .footer-area { margin-top: 60px; padding: 40px 0; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #f1f5f9; width: 100%; }
        .copyright { font-size: 12px; color: #94a3b8; font-weight: 800; }

        /* Social Share */
        .share-container { position: relative; width: 50px; height: 50px; }
        .main-share-btn { width: 50px; height: 50px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; }
        .social-menu a { position: absolute; width: 42px; height: 42px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid #e2e8f0; text-decoration: none; font-size: 18px; opacity: 0; pointer-events: none; top: 4px; left: 4px; transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform: scale(0); }
        .share-container.active .social-menu a { opacity: 1; pointer-events: auto; }
        .share-container.active .social-menu a:nth-child(1) { transform: translate(0px, -80px) scale(1); color: #25D366; }
        .share-container.active .social-menu a:nth-child(2) { transform: translate(-80px, 0px) scale(1); color: #1877F2; }
        .share-container.active .social-menu a:nth-child(3) { transform: translate(0px, 80px) scale(1); color: #0088cc; }
        .share-container.active .social-menu a:nth-child(4) { transform: translate(-60px, -60px) scale(1); color: #E4405F; }
        .share-container.active .social-menu a:nth-child(5) { transform: translate(-60px, 60px) scale(1); color: #FF0000; }

        .status { margin-top: 20px; font-size: 15px; color: var(--primary); font-weight: 800; }
    </style>
</head>
<body>

<div class="page-container">
    <img src="https://elibrary.rsssc.org/GraduationERP/Student/images/rsssc-log.png" alt="RSS College Logo" class="header-img">
    <div class="full-divider"></div>
    <h1>R.S.S SCIENCE COLLEGE, SITAMARHI</h1>
    
    <div class="alert-container">
        <div class="marquee-content">
            <div class="alert-text">⚠️ सूचना: वैध यूआईडी का उपयोग करें | रिसिप्ट डाउनलोड करने के लिए लॉगिन ज़रूरी है | धन्यवाद 🙏 !</div>
            <div class="alert-text">⚠️ सूचना: वैध यूआईडी का उपयोग करें | रिसिप्ट डाउनलोड करने के लिए लॉगिन ज़रूरी है | धन्यवाद 🙏 !</div>
        </div>
    </div>

    <div class="service-selection">
        <button class="service-btn active" onclick="selectService('receipt', this)">Fee Receipt</button>
        <button class="service-btn" onclick="selectService('shapath', this)">शपथ पत्र</button>
    </div>
    
    <div class="input-group">
        <label id="serviceLabel">Exam Fee Receipt Download Semester III</label>
        <input type="text" id="uid" placeholder="Enter Student UID" autocomplete="off">
    </div>

    <button class="btn-download" onclick="generateAndPrint()">Download & Print</button>
    <div class="status" id="status"></div>

    <div class="footer-area">
        <div class="copyright">© 2026 By SADIK HUSAIN</div>
        <div class="share-container" id="shareBox">
            <div class="main-share-btn" onclick="toggleShare()"><i class="fas fa-share-nodes"></i></div>
            <div class="social-menu">
                <a href="#"><i class="fab fa-whatsapp"></i></a>
                <a href="#"><i class="fab fa-facebook-f"></i></a>
                <a href="#"><i class="fab fa-telegram-plane"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-youtube"></i></a>
            </div>
        </div>
    </div>
</div>

<script>
let selectedService = 'receipt'; 

function toggleShare() { document.getElementById('shareBox').classList.toggle('active'); }

function selectService(service, btn) {
    selectedService = service;
    document.querySelectorAll('.service-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('serviceLabel').innerText = service === 'receipt' ? 'Fee Receipt Download' : 'Shapath Patra Download';
}

function generateAndPrint() {
  const uidInput = document.getElementById("uid");
  const uid = uidInput.value.trim();
  const status = document.getElementById("status");

  if (!uid) { status.textContent = "❌ Please enter UID"; return; }
  
  status.textContent = "⏳ Opening Print Tab...";

  let targetURL = "";
  if (selectedService === 'receipt') {
    targetURL = "https://elibrary.rsssc.org/GraduationERP/Student/Examination/SuccessPage.aspx?uid=" + encodeURIComponent(uid);
  } else {
    targetURL = "https://elibrary.rsssc.org/GraduationERP/Student/Admission/SapathPatra.aspx?uid=" + encodeURIComponent(uid);
  }

  // सादिक भाई, यहाँ 'New Tab' का सीधा इस्तेमाल किया गया है
  const printWin = window.open(targetURL, '_blank');

  // टैब खोलने के बाद इनपुट साफ़ करें
  uidInput.value = "";

  // नए टैब में प्रिंट कमांड भेजने की कोशिश
  if (printWin) {
      status.textContent = "✅ Tab Opened! Press Ctrl+P if print doesn't start.";
      
      // यह हिस्सा पेज लोड होने के बाद प्रिंट ट्रिगर करेगा (अगर ब्राउज़र अनुमति दे)
      printWin.onload = function() {
          printWin.print();
      };
  } else {
    status.textContent = "❌ Pop-up Blocked! Please allow pop-ups in browser.";
  }
}

document.getElementById('uid').addEventListener('keypress', (e) => { if (e.key === 'Enter') generateAndPrint(); });
</script>

</body>
</html>
